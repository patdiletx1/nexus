name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dockerized Go tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/api \
            golang:1.23-alpine \
            sh -lc "/usr/local/go/bin/go test ./..."
